name: Validate

on:
  pull_request:
  push:
    branches-ignore: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install validation deps
        run: python -m pip install --upgrade pip pyyaml

      - name: Validate compose files (VPS overlay)
        run: docker compose -f docker-compose.yml -f docker-compose.vps.yml config -q

      - name: Validate compose files (local override)
        run: docker compose config -q

      - name: Validate scripts and renderers
        run: |
          bash -n scripts/provision-profile.sh
          bash -n scripts/detect-env.sh
          bash -n deploy.sh
          bash -n scripts/vps-setup.sh
          bash -n scripts/vps-bootstrap.sh
          python -m py_compile scripts/render-config.py scripts/render-environment-context.py
