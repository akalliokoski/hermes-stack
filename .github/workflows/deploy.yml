name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: Optional SSH host or Tailscale IP override for the VPS deploy target
        required: false
        type: string

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PRIMARY_DEPLOY_TARGET: ${{ github.event.inputs.deploy_target || vars.VPS_HOST || secrets.VPS_HOST || '' }}
      FALLBACK_DEPLOY_TARGET: 100.121.250.82
      EXPECTED_REMOTE_HOSTNAME: ${{ vars.VPS_EXPECTED_HOSTNAME || 'vps' }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_HOME_CHANNEL || secrets.TELEGRAM_HOME_CHANNEL }}
      DEPLOY_SUMMARY: ${{ github.event.head_commit.message || format('{0} deploy on {1}', github.event_name, github.ref_name) }}
    steps:
      - uses: actions/checkout@v5

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          if [ -n "${{ secrets.VPS_SSH_KNOWN_HOSTS }}" ]; then
            printf '%s\n' "${{ secrets.VPS_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          else
            cp .github/ssh_known_hosts ~/.ssh/known_hosts
          fi

          if [ ! -s ~/.ssh/known_hosts ]; then
            echo "No pinned SSH host keys available. Set VPS_SSH_KNOWN_HOSTS or populate .github/ssh_known_hosts." >&2
            exit 1
          fi

          chmod 600 ~/.ssh/known_hosts

      - name: Resolve deploy target
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_DEPLOY_TARGET: ${{ github.event.inputs.deploy_target || '' }}
        run: |
          validate_target() {
            local candidate="$1"
            [[ "$candidate" =~ ^[A-Za-z0-9.-]+$ ]]
          }

          candidates=()
          if [ -n "$PRIMARY_DEPLOY_TARGET" ]; then
            candidates+=("$PRIMARY_DEPLOY_TARGET")
          fi

          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$DISPATCH_DEPLOY_TARGET" ]; then
            fallback_allowed=false
          else
            fallback_allowed=true
          fi

          if $fallback_allowed; then
            candidates+=("$FALLBACK_DEPLOY_TARGET")
          fi

          seen_candidates=""
          for candidate in "${candidates[@]}"; do
            if [ -n "$seen_candidates" ] && printf '%s\n' "$seen_candidates" | grep -Fx -- "$candidate" >/dev/null; then
              continue
            fi
            seen_candidates="${seen_candidates}${candidate}"$'\n'

            if ! validate_target "$candidate"; then
              echo "Skipping invalid deploy target candidate: $candidate" >&2
              continue
            fi

            if ! ssh-keygen -F "$candidate" -f ~/.ssh/known_hosts >/dev/null; then
              echo "Skipping deploy target candidate without pinned known_hosts entry: $candidate" >&2
              continue
            fi

            echo "Trying deploy target: $candidate"
            remote_hostname=$(ssh -i ~/.ssh/deploy_key \
              -o BatchMode=yes \
              -o IdentitiesOnly=yes \
              -o StrictHostKeyChecking=yes \
              -o UserKnownHostsFile=$HOME/.ssh/known_hosts \
              -o ConnectTimeout=10 \
              "${{ secrets.VPS_SSH_USER }}@$candidate" "hostname -s" 2>/dev/null || true)

            if [ "$remote_hostname" = "$EXPECTED_REMOTE_HOSTNAME" ]; then
              echo "DEPLOY_TARGET=$candidate" >> "$GITHUB_ENV"
              echo "Using deploy target: $candidate"
              exit 0
            fi

            if [ -n "$remote_hostname" ]; then
              echo "Candidate $candidate resolved to unexpected host '$remote_hostname'" >&2
            fi
          done

          echo "Unable to resolve a trusted deploy target. Ensure deploy candidates are reachable and VPS_SSH_KNOWN_HOSTS includes pinned entries for each allowed hostname or IP." >&2
          exit 1

      - name: Sync files
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='backups/' \
            -e "ssh -i $HOME/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts" \
            . ${{ secrets.VPS_SSH_USER }}@${{ env.DEPLOY_TARGET }}:/opt/hermes/

      - name: Deploy stack
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=$HOME/.ssh/known_hosts \
            ${{ secrets.VPS_SSH_USER }}@${{ env.DEPLOY_TARGET }} \
            "set -e
             cd /opt/hermes
             HERMES_UID=\$(id -u hermes)
             HERMES_GID=\$(id -g hermes)
             sudo install -d -o hermes -g hermes -m 755 /home/hermes/sync /home/hermes/sync/wiki /home/hermes/sync/backups /home/hermes/sync/backups/hindsight
             sudo chown -R hermes:hermes /home/hermes/sync
             sudo install -o hermes -g hermes -m 600 config.yaml /home/hermes/.hermes/config.yaml
             sudo install -m 644 scripts/hermes-gateway.service /etc/systemd/system/hermes-gateway.service
             sudo install -m 644 scripts/hermes-dashboard.service /etc/systemd/system/hermes-dashboard.service
             sudo chmod +x scripts/configure-tailscale-serve.sh scripts/repair-syncthing-volume.sh scripts/verify-local-web-bindings.sh scripts/verify-tailnet-web-routes.sh
             sudo systemctl daemon-reload
             sudo systemctl enable hermes-gateway hermes-dashboard
             HERMES_UID=\$HERMES_UID HERMES_GID=\$HERMES_GID bash scripts/repair-syncthing-volume.sh
             docker system prune -af
             docker compose pull --quiet --ignore-buildable
             HERMES_UID=\$HERMES_UID HERMES_GID=\$HERMES_GID docker compose -f docker-compose.yml -f docker-compose.vps.yml up -d --remove-orphans
             sudo systemctl restart hermes-dashboard
             sudo systemctl restart hermes-gateway
             sudo bash scripts/configure-tailscale-serve.sh
             systemctl is-active hermes-dashboard
             systemctl is-active hermes-gateway
             docker compose -f docker-compose.yml -f docker-compose.vps.yml ps
             bash scripts/verify-local-web-bindings.sh
             bash scripts/verify-tailnet-web-routes.sh
             tailscale serve status --json"

      - name: Notify success
        if: success() && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
        continue-on-error: true
        run: |
          curl -fsS -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ env.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            --data-urlencode text="✅ *hermes deployed* \`${{ github.sha }}\`
          👤 ${{ github.actor }}
          📝 ${{ env.DEPLOY_SUMMARY }}"

      - name: Notify failure
        if: (failure() || cancelled()) && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
        continue-on-error: true
        run: |
          curl -fsS -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ env.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            --data-urlencode text="❌ *hermes deploy FAILED* \`${{ github.sha }}\`
          👤 ${{ github.actor }}
          🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
