# Local development overrides – applied automatically by Docker Compose.
# Do not deploy this file to the VPS.
services:
  hermes-agent:
    volumes:
      - ./config.yaml:/opt/data/config.yaml:ro  # use repo config instead of entrypoint default

  # Per-profile config overrides: mount a profile-specific config.yaml if the
  # profile needs different model/settings from the shared root config.yaml.
  # Named profiles look for config at /opt/data/profiles/<name>/config.yaml.
  #
  # hermes-coder:
  #   volumes:
  #     - ./profiles/coder/config.yaml:/opt/data/profiles/coder/config.yaml:ro

  litestream:
    volumes:
      - ./litestream.local.yml:/etc/litestream.yml:ro  # lighter retention for local dev
      - hermes_data:/opt/data
      - hermes_backups:/opt/backups

  backup:
    environment:
      BACKUP_CRON_EXPRESSION: "0 3 * * 0"   # weekly (not daily) for local dev
      BACKUP_RETENTION_DAYS: "14"

volumes:
  hermes_backups:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/backups
