# Hermes support stack.
#
# hermes-agent itself runs natively on the host (via install.sh + systemd) and
# uses its Docker terminal backend to sandbox each shell command. This compose
# file only manages the auxiliary services hermes talks to: firecrawl (web
# scraping) and hindsight (vector memory). See SETUP.md for the full topology.
#
# Hermes state lives at /home/hermes/.hermes on VPS (or ~/.hermes locally) and
# is managed by the host-native Hermes runtime.

services:
  # ---------------------------------------------------------------------------
  # Firecrawl – web crawling & scraping
  # ---------------------------------------------------------------------------
  playwright:
    image: ghcr.io/firecrawl/playwright-service:latest
    restart: unless-stopped
    environment:
      PORT: 3000
    networks: [hermes]

  nuq-migrate:
    image: postgres:16-alpine
    restart: "no"
    command: >
      sh -c "until pg_isready -h db -U ${POSTGRES_USER:-hermes}; do sleep 1; done &&
             psql postgresql://${POSTGRES_USER:-hermes}:${POSTGRES_PASSWORD:-hermes}@db:5432/${POSTGRES_DB:-hermes} -f /nuq-init.sql"
    volumes:
      - ./scripts/nuq-init.sql:/nuq-init.sql:ro
    depends_on: [db]
    networks: [hermes]

  firecrawl-api:
    image: ghcr.io/firecrawl/firecrawl:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3002"
    environment: &firecrawl-env
      PORT: 3002
      HOST: 0.0.0.0
      REDIS_URL: redis://redis:6379
      REDIS_RATE_LIMIT_URL: redis://redis:6379
      PLAYWRIGHT_MICROSERVICE_URL: http://playwright:3000/scrape
      USE_DB_AUTHENTICATION: "false"
      BULL_AUTH_KEY: ${BULL_AUTH_KEY:-local}
      DATABASE_URL: postgresql://${POSTGRES_USER:-hermes}:${POSTGRES_PASSWORD:-hermes}@db:5432/${POSTGRES_DB:-hermes}
      NUQ_DATABASE_URL: postgresql://${POSTGRES_USER:-hermes}:${POSTGRES_PASSWORD:-hermes}@db:5432/${POSTGRES_DB:-hermes}
      NUQ_RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      PROXY_SERVER: ${FIRECRAWL_PROXY_SERVER:-}
      PROXY_USERNAME: ${FIRECRAWL_PROXY_USERNAME:-}
      PROXY_PASSWORD: ${FIRECRAWL_PROXY_PASSWORD:-}
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_started
      playwright:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      nuq-migrate:
        condition: service_completed_successfully
    networks: [hermes]

  firecrawl-worker:
    image: ghcr.io/firecrawl/firecrawl:latest
    restart: unless-stopped
    command: node dist/src/services/queue-worker.js
    environment: *firecrawl-env
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_started
      playwright:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      nuq-migrate:
        condition: service_completed_successfully
    networks: [hermes]

  rabbitmq:
    image: rabbitmq:3-alpine
    restart: unless-stopped
    # Firecrawl's AMQP queue is disposable here; use tmpfs so broker state does not
    # survive image/schema drift via Docker's implicit anonymous /var/lib/rabbitmq
    # volume and wedge future deploys.
    tmpfs:
      - /var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks: [hermes]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks: [hermes]

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hermes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hermes}
      POSTGRES_DB: ${POSTGRES_DB:-hermes}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [hermes]

  # ---------------------------------------------------------------------------
  # Hindsight – agent memory (vector memory bank)
  # API:  http://127.0.0.1:8888
  # UI:   http://127.0.0.1:9999
  # ---------------------------------------------------------------------------
  hindsight:
    image: ghcr.io/vectorize-io/hindsight:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8888:8888"
      - "127.0.0.1:9999:9999"
    environment:
      HINDSIGHT_API_LLM_API_KEY: ${HINDSIGHT_LLM_API_KEY}
      HINDSIGHT_API_LLM_PROVIDER: ${HINDSIGHT_LLM_PROVIDER:-openai}
      HINDSIGHT_API_LLM_MODEL: ${HINDSIGHT_LLM_MODEL:-google/gemma-4-26b-a4b-it}
      HINDSIGHT_API_LLM_BASE_URL: ${HINDSIGHT_LLM_BASE_URL:-https://openrouter.ai/api/v1}
      HINDSIGHT_DB_PASSWORD: ${HINDSIGHT_DB_PASSWORD:-hindsight}
    volumes:
      - hindsight_data:/home/hindsight/.pg0
    networks: [hermes]

networks:
  hermes:
    driver: bridge

volumes:
  redis_data:
  postgres_data:
  hindsight_data:
