services:
  # ---------------------------------------------------------------------------
  # Hermes – main agent process
  # ---------------------------------------------------------------------------
  hermes-agent:
    build: .
    image: hermes-agent:local
    container_name: hermes_agent
    restart: unless-stopped
    command: gateway run
    env_file: .env
    environment:
      HERMES_PROFILE: ${HERMES_PROFILE:-default}
      FIRECRAWL_API_URL: http://firecrawl-api:3002
    volumes:
      - ./sync:/opt/sync              # shared data (skills, notes, memory exports)
      - hermes_data:/opt/data         # agent state: soul, skills, sessions, memory
    depends_on: [hindsight, firecrawl-api, litestream]
    networks: [hermes]
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    labels:
      - docker-volume-backup.exec-label=hermes-backup-hook
      - "docker-volume-backup.archive-pre=/bin/sh -c \"python3 -c 'import sqlite3; sqlite3.connect(\\\"/opt/data/state.db\\\").execute(\\\"PRAGMA wal_checkpoint(PASSIVE)\\\")'\" "
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: "2"

  # ---------------------------------------------------------------------------
  # Firecrawl – web crawling & scraping
  # ---------------------------------------------------------------------------
  playwright:
    image: ghcr.io/firecrawl/playwright-service:latest
    restart: unless-stopped
    environment:
      PORT: 3000
    networks: [hermes]

  nuq-migrate:
    image: postgres:16-alpine
    restart: "no"
    command: >
      sh -c "until pg_isready -h db -U ${POSTGRES_USER:-hermes}; do sleep 1; done &&
             psql postgresql://${POSTGRES_USER:-hermes}:${POSTGRES_PASSWORD:-hermes}@db:5432/${POSTGRES_DB:-hermes} -f /nuq-init.sql"
    volumes:
      - ./scripts/nuq-init.sql:/nuq-init.sql:ro
    depends_on: [db]
    networks: [hermes]

  firecrawl-api:
    image: ghcr.io/firecrawl/firecrawl:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3002"
    environment: &firecrawl-env
      PORT: 3002
      HOST: 0.0.0.0
      REDIS_URL: redis://redis:6379
      REDIS_RATE_LIMIT_URL: redis://redis:6379
      PLAYWRIGHT_MICROSERVICE_URL: http://playwright:3000
      USE_DB_AUTHENTICATION: "false"
      BULL_AUTH_KEY: ${BULL_AUTH_KEY:-local}
      DATABASE_URL: postgresql://${POSTGRES_USER:-hermes}:${POSTGRES_PASSWORD:-hermes}@db:5432/${POSTGRES_DB:-hermes}
      NUQ_DATABASE_URL: postgresql://${POSTGRES_USER:-hermes}:${POSTGRES_PASSWORD:-hermes}@db:5432/${POSTGRES_DB:-hermes}
      NUQ_RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on: [redis, db, playwright, rabbitmq, nuq-migrate]
    networks: [hermes]

  firecrawl-worker:
    image: ghcr.io/firecrawl/firecrawl:latest
    restart: unless-stopped
    command: node dist/src/services/queue-worker.js
    environment: *firecrawl-env
    depends_on: [redis, db, playwright, rabbitmq, nuq-migrate]
    networks: [hermes]

  rabbitmq:
    image: rabbitmq:3-alpine
    restart: unless-stopped
    networks: [hermes]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks: [hermes]

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hermes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hermes}
      POSTGRES_DB: ${POSTGRES_DB:-hermes}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [hermes]

  # ---------------------------------------------------------------------------
  # Hindsight – agent memory (memory banks, one per profile)
  # API:  http://localhost:8888
  # UI:   http://localhost:9999
  # ---------------------------------------------------------------------------
  # ---------------------------------------------------------------------------
  # Litestream – continuous SQLite replication for state.db (WAL-safe)
  # Replicates to hermes_backups volume (→ /opt/hermes-backups on VPS, ./backups locally)
  # ---------------------------------------------------------------------------
  litestream:
    image: litestream/litestream:latest
    restart: unless-stopped
    command: replicate
    volumes:
      - ./litestream.yml:/etc/litestream.yml:ro
      - hermes_data:/opt/data
      - hermes_backups:/opt/backups
    networks: [hermes]

  # ---------------------------------------------------------------------------
  # Backup – daily snapshots of the full hermes_data volume
  # Handles retention, pre-backup WAL checkpoint, and versioned tarballs.
  # Trigger manually: make backup-now
  # ---------------------------------------------------------------------------
  backup:
    image: offen/docker-volume-backup:v2
    restart: unless-stopped
    environment:
      BACKUP_CRON_EXPRESSION: "0 3 * * *"
      BACKUP_FILENAME_FORMAT: "hermes_data_%Y-%m-%dT%H-%M-%S.tar.gz"
      BACKUP_RETENTION_DAYS: "30"
      EXEC_LABEL: hermes-backup-hook
      EXEC_FORWARD_OUTPUT: "true"
    volumes:
      - hermes_data:/backup/hermes_data:ro
      - hermes_backups:/archive
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [hermes]

  hindsight:
    image: ghcr.io/vectorize-io/hindsight:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8888:8888"   # REST API
      - "127.0.0.1:9999:9999"   # Control Plane UI
    environment:
      HINDSIGHT_API_LLM_API_KEY: ${HINDSIGHT_LLM_API_KEY}
      HINDSIGHT_API_LLM_PROVIDER: ${HINDSIGHT_LLM_PROVIDER:-openai}
      HINDSIGHT_API_LLM_MODEL: ${HINDSIGHT_LLM_MODEL:-google/gemma-4-26b-a4b-it}
      HINDSIGHT_API_LLM_BASE_URL: ${HINDSIGHT_LLM_BASE_URL:-https://openrouter.ai/api/v1}
      HINDSIGHT_DB_PASSWORD: ${HINDSIGHT_DB_PASSWORD:-hindsight}
    volumes:
      - hindsight_data:/home/hindsight/.pg0
    networks: [hermes]

networks:
  hermes:
    driver: bridge

volumes:
  redis_data:
  postgres_data:
  hindsight_data:
  hermes_data:
  hermes_backups:    # backup destination — overridden to host bind-mount in vps/override files
