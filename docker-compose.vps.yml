# VPS-only services – syncthing and Tailscale.
# Usage: docker compose -f docker-compose.yml -f docker-compose.vps.yml up -d
#   (or just: make up)
services:
  # ---------------------------------------------------------------------------
  # Syncthing – sync hermes data (skills, notes, …) → MacBook Pro
  # Runs over Tailscale – no public port exposure needed.
  # Web UI accessible via: ssh -L 8384:localhost:8384 my-vps
  # Sync protocol bound to Tailscale interface only (set in Syncthing GUI).
  # ---------------------------------------------------------------------------
  syncthing:
    image: syncthing/syncthing:latest
    restart: unless-stopped
    hostname: hermes-vps
    network_mode: host        # allows Syncthing to see the Tailscale interface
    volumes:
      - syncthing_config:/var/syncthing
      - ./sync:/sync/shared            # general shared folder (skills, notes, …)
      - hermes_data:/sync/hermes-data  # agent state: soul, skills, sessions, memory
      - ./docker/stignore:/sync/hermes-data/.stignore:ro  # exclude state.db* (Litestream owns those)
    environment:
      PCAP: ""              # suppress unnecessary capabilities warning

  # ---------------------------------------------------------------------------
  # Tailscale – expose Hindsight API/UI directly on your tailnet
  #
  # After first start, approve the node in https://login.tailscale.com/admin/machines
  # Then access from any tailnet device:
  #   https://hermes-vps.<tailnet>.ts.net/memory/     → Hindsight REST API
  #   https://hermes-vps.<tailnet>.ts.net/memory-ui/  → Hindsight Control Plane UI
  # ---------------------------------------------------------------------------
  tailscale:
    image: tailscale/tailscale:latest
    container_name: hermes_ts
    restart: unless-stopped
    hostname: hermes-vps
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY:-}
      TS_STATE_DIR: /var/lib/tailscale
      TS_SERVE_CONFIG: /config/serve.json
      TS_USERSPACE: "false"
    volumes:
      - tailscale_state:/var/lib/tailscale
      - ./tailscale:/config:ro
      - /dev/net/tun:/dev/net/tun
    cap_add: [NET_ADMIN, SYS_MODULE]
    network_mode: host

volumes:
  syncthing_config:
  tailscale_state:
  hermes_backups:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/hermes-backups   # host path — survives docker compose down -v
