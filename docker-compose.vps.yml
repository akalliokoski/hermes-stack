# VPS-only services – syncthing.
# Tailscale runs on the host (not in Docker) to avoid TUN device conflicts.
# Hindsight is exposed on the tailnet via: tailscale serve --config tailscale/serve.json
# Usage: docker compose -f docker-compose.yml -f docker-compose.vps.yml up -d
#   (or just: make up)
services:
  # ---------------------------------------------------------------------------
  # Hermes – mount repo config.yaml into the data volume so VPS picks up the
  # same model/provider settings as local dev.
  # ---------------------------------------------------------------------------
  hermes-agent:
    user: "1000:1000"
    volumes:
      - ./config.yaml:/opt/data/config.yaml:ro

  # ---------------------------------------------------------------------------
  # Syncthing – sync hermes data (skills, notes, …) → MacBook Pro
  # Runs over Tailscale – no public port exposure needed.
  # Web UI accessible via: ssh -L 8384:localhost:8384 my-vps
  # Sync protocol bound to Tailscale interface only (set in Syncthing GUI).
  # ---------------------------------------------------------------------------
  syncthing-init:
    image: busybox
    command: chown -R 1000:1000 /sync/hermes-data /sync/shared
    volumes:
      - hermes_data:/sync/hermes-data
      - ./sync:/sync/shared
    restart: "no"

  syncthing:
    image: syncthing/syncthing:latest
    restart: unless-stopped
    hostname: hermes-vps
    network_mode: host        # allows Syncthing to see the Tailscale interface
    depends_on:
      syncthing-init:
        condition: service_completed_successfully
    volumes:
      - syncthing_config:/var/syncthing
      - ./sync:/sync/shared            # general shared folder (skills, notes, …)
      - hermes_data:/sync/hermes-data  # agent state: soul, skills, sessions, memory
      - ./docker/stignore:/sync/hermes-data/.stignore:ro  # exclude state.db* (Litestream owns those)
    environment:
      PCAP: ""              # suppress unnecessary capabilities warning

volumes:
  syncthing_config:
  hermes_backups:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/hermes-backups   # host path — survives docker compose down -v
