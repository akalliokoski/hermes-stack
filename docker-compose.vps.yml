# VPS-only services – Syncthing plus a static landing page for tailnet UIs.
# Tailscale runs on the host (not in Docker) to avoid TUN device conflicts.
# Tailnet routes are applied on the host via scripts/configure-tailscale-serve.sh
# Usage: docker compose -f docker-compose.yml -f docker-compose.vps.yml up -d
#   (or just: make up)
services:
  # ---------------------------------------------------------------------------
  # Static landing page for tailnet-exposed Hermes stack UIs.
  # Published only on 127.0.0.1 and exposed outward via Tailscale Serve.
  # ---------------------------------------------------------------------------
  ui-landing:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:80"
    volumes:
      - ./web/landing:/usr/share/nginx/html:ro

  # ---------------------------------------------------------------------------
  # Reverse proxy for Hermes Dashboard.
  # The upstream dashboard now rejects non-bound Host headers, so Tailscale
  # Serve cannot point at 127.0.0.1:9119 directly. This local proxy rewrites
  # Host to the loopback dashboard listener while preserving tailnet-only
  # exposure at the outer Tailscale layer.
  # ---------------------------------------------------------------------------
  hermes-dashboard-proxy:
    image: nginx:alpine
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./web/dashboard-proxy/default.conf:/etc/nginx/conf.d/default.conf:ro

  # ---------------------------------------------------------------------------
  # Syncthing – sync /home/hermes/sync → MacBook over Tailscale.
  # Runs over Tailscale – no public port exposure needed.
  # Web UI is exposed on the tailnet via https://<vps-tailnet-name>:9445/
  # Sync protocol bound to Tailscale interface only (set in Syncthing GUI).
  # ---------------------------------------------------------------------------
  syncthing:
    image: syncthing/syncthing:latest
    restart: unless-stopped
    hostname: hermes-vps
    network_mode: host        # allows Syncthing to see the Tailscale interface
    volumes:
      - syncthing_config:/var/syncthing
      - /home/hermes/sync:/sync
      - /home/hermes/work/hermes-stack:/sync/hermes-stack
    environment:
      PUID: "${HERMES_UID:-1001}"   # resolved at deploy time from `id -u hermes`
      PGID: "${HERMES_GID:-1001}"   # resolved at deploy time from `id -g hermes`
      PCAP: ""                      # suppress unnecessary capabilities warning
      STGUIADDRESS: "127.0.0.1:8384"  # keep the Syncthing web UI localhost-only; publish it via Tailscale Serve instead

volumes:
  syncthing_config:
    name: hermes_syncthing_config
  hermes_backups:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/hermes/sync/backups   # tarball backups synced by Syncthing
  hindsight_sql_backups:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/hermes/sync/backups/hindsight   # separate path so tarball pruning cannot delete SQL dumps
