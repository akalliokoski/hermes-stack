# VPS-only services – syncthing.
# Tailscale runs on the host (not in Docker) to avoid TUN device conflicts.
# Hindsight is exposed on the tailnet via: tailscale serve --config tailscale/serve.json
# Usage: docker compose -f docker-compose.yml -f docker-compose.vps.yml up -d
#   (or just: make up)
services:
  # ---------------------------------------------------------------------------
  # Syncthing – sync /home/hermes/sync → MacBook over Tailscale.
  # Runs over Tailscale – no public port exposure needed.
  # Web UI accessible via: ssh -L 8384:localhost:8384 my-vps
  # Sync protocol bound to Tailscale interface only (set in Syncthing GUI).
  # ---------------------------------------------------------------------------
  syncthing:
    image: syncthing/syncthing:latest
    restart: unless-stopped
    hostname: hermes-vps
    network_mode: host        # allows Syncthing to see the Tailscale interface
    volumes:
      - syncthing_config:/var/syncthing
      - /home/hermes/sync:/sync
    environment:
      PUID: "${HERMES_UID:-1001}"   # resolved at deploy time from `id -u hermes`
      PGID: "${HERMES_GID:-1001}"   # resolved at deploy time from `id -g hermes`
      PCAP: ""                      # suppress unnecessary capabilities warning

volumes:
  syncthing_config:
  hermes_backups:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/hermes/sync/backups   # host path — survives docker compose down -v
