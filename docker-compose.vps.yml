# VPS-only services – Syncthing plus a static landing page for tailnet UIs.
# Tailscale runs on the host (not in Docker) to avoid TUN device conflicts.
# Tailnet routes are applied on the host via scripts/configure-tailscale-serve.sh
# Usage: docker compose -f docker-compose.yml -f docker-compose.vps.yml up -d
#   (or just: make up)
services:
  # ---------------------------------------------------------------------------
  # Static landing page for tailnet-exposed Hermes stack UIs.
  # Published only on 127.0.0.1 and exposed outward via Tailscale Serve.
  # ---------------------------------------------------------------------------
  ui-landing:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:80"
    volumes:
      - ./web/landing:/usr/share/nginx/html:ro

  # ---------------------------------------------------------------------------
  # Hermes Workspace V2 – optional mobile/PWA operator surface for the VPS.
  # Talks to the Hermes API server exposed by the native gateway on 127.0.0.1:8642.
  # Keep it localhost-only and publish it on the tailnet through Tailscale Serve.
  # ---------------------------------------------------------------------------
  hermes-workspace:
    image: ghcr.io/outsourc-e/hermes-workspace:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      HERMES_API_URL: ${HERMES_API_URL:-http://127.0.0.1:8642}
      HERMES_API_TOKEN: ${API_SERVER_KEY:-}
      HERMES_PASSWORD: ${HERMES_WORKSPACE_PASSWORD:-}
    depends_on:
      - ui-landing

  # ---------------------------------------------------------------------------
  # Syncthing – sync /home/hermes/sync → MacBook over Tailscale.
  # Runs over Tailscale – no public port exposure needed.
  # Web UI is exposed on the tailnet via https://<vps-tailnet-name>:9445/
  # Sync protocol bound to Tailscale interface only (set in Syncthing GUI).
  # ---------------------------------------------------------------------------
  syncthing:
    image: syncthing/syncthing:latest
    restart: unless-stopped
    hostname: hermes-vps
    network_mode: host        # allows Syncthing to see the Tailscale interface
    volumes:
      - syncthing_config:/var/syncthing
      - /home/hermes/sync:/sync
      - /home/hermes/work/hermes-stack:/sync/hermes-stack
    environment:
      PUID: "${HERMES_UID:-1001}"   # resolved at deploy time from `id -u hermes`
      PGID: "${HERMES_GID:-1001}"   # resolved at deploy time from `id -g hermes`
      PCAP: ""                      # suppress unnecessary capabilities warning
      STGUIADDRESS: "127.0.0.1:8384"  # keep the Syncthing web UI localhost-only; publish it via Tailscale Serve instead

  # ---------------------------------------------------------------------------
  # Audiobookshelf – self-hosted podcast/audiobook server.
  # Bound to localhost and published on the tailnet through Tailscale Serve.
  # Media roots live under /data/audiobookshelf on the VPS.
  # ---------------------------------------------------------------------------
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    restart: unless-stopped
    user: "${HERMES_UID:-1001}:${HERMES_GID:-1001}"
    ports:
      - "127.0.0.1:13378:80"
    volumes:
      - /data/audiobookshelf/audiobooks:/audiobooks
      - /data/audiobookshelf/podcasts:/podcasts
      - /data/audiobookshelf/metadata:/metadata
      - /data/audiobookshelf/config:/config
    networks: [hermes]

  # ---------------------------------------------------------------------------
  # Jellyfin – self-hosted video server for Hermes-generated explainer videos.
  # Bound to localhost and published on the tailnet through Tailscale Serve.
  # Media roots live under /data/jellyfin on the VPS.
  # ---------------------------------------------------------------------------
  jellyfin:
    image: jellyfin/jellyfin:latest
    restart: unless-stopped
    user: "${HERMES_UID:-1001}:${HERMES_GID:-1001}"
    ports:
      - "127.0.0.1:8096:8096"
    volumes:
      - /data/jellyfin/config:/config
      - /data/jellyfin/cache:/cache
      - /data/jellyfin/videos:/media/videos
    networks: [hermes]

volumes:
  syncthing_config:
    name: hermes_syncthing_config
  hermes_backups:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/hermes/sync/backups   # tarball backups synced by Syncthing
  hindsight_sql_backups:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/hermes/sync/backups/hindsight   # separate path so tarball pruning cannot delete SQL dumps
